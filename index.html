<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Gallery</title>
</head>
<body>
    <main class="page">
    
    <header class="title">
        <p class="title-subtitle1">artifacts archive</p>
        <h1>Gallery</h1>
        <p class="subtitle2">pictures that i found interesting</p>
        <button id="dark-toggle" class="theme-toggle">Dark Mode: off</button>
    </header>

    <section class="gallery">
        <figure class="gallery-item" data-title="Image title" data-description="random description ahh">
            <img src="/assets/photos/image0.jpeg">
        <figcaption>
            <h2>Unicorns</h2>
            <p>Picture that i found on gifs galore. I really like this one!</p>
        </figcaption>
        </figure>
        <figure class="gallery-item" data-title="no title" data-description="description 2">
            <img src="/assets/photos/CASTLE19.gif">
        <figcaption>
            <h2>House</h2>
            <p>Retro house ig</p>
        </figcaption>
        </figure>
        <figure class="gallery-item" data-title="no title" data-description="description 2">
            <img src="/assets/photos/3DCAT.gif">
        <figcaption>
            <h2>3D cat</h2>
            <p>one of the oldest 3d cats</p>
        </figcaption>
        </figure>
    </section>

    <div class="modal" id="image-modal">
        <div class="modal-stuff">
            <span class="close">&times;</span>
            <img id="modal-image" src="">
            <h2 id="modal-title"></h2>
            <p id="modal-description"></p>
            <button class="navigation-button previous" id="previous">❮</button>
            <button class="navigation-button next" id="next">❯</button>
        </div>
        
    </div>
    <script src="script.js"></script>

    </main>
</body>
</html>
